<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NaniNavi | Senior driving support for caregivers</title>
  <style>
    :root {
      --bg: #ffffff;
      --text: #0f172a;
      --muted: #475569;
      --blue-50: #eff6ff;
      --blue-100: #dbeafe;
      --blue-200: #bfdbfe;
      --blue-700: #3b82f6;
      --brand: #516989;
      --card: #ffffff;
      --border: #e2e8f0;
      --shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
      --radius: 24px;
      --max: 1200px;
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background: var(--bg);
      line-height: 1.55;
    }
    a { color: inherit; text-decoration: none; }
    img { max-width: 100%; display: block; }
    .container { width: min(var(--max), calc(100% - 32px)); margin: 0 auto; }
    .header {
      position: sticky; top: 0; z-index: 20;
      background: rgba(255,255,255,0.92); backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
    }
    .header-inner {
      display: flex; align-items: center; justify-content: space-between; gap: 20px; padding: 16px 0;
    }
    .brand { display: flex; align-items: center; gap: 12px; }
    .brand-mark { width: 44px; height: 44px; }
    .brand-title { font-size: 1.65rem; font-weight: 800; line-height: 1; }
    .brand-sub { font-size: 0.72rem; letter-spacing: .16em; text-transform: uppercase; color: var(--blue-700); margin-top: 4px; }
    .nav { display: flex; gap: 24px; color: #334155; font-weight: 600; }
    .nav a:hover { color: var(--blue-700); }
    .app-badge {
      display: inline-flex; align-items: center; gap: 12px; background: #111827; color: white;
      padding: 12px 18px; border-radius: 18px; box-shadow: var(--shadow); font-weight: 600;
    }
    .app-badge small { display: block; text-transform: uppercase; letter-spacing: .14em; color: #cbd5e1; font-size: 10px; }
    .btn {
      display: inline-flex; align-items: center; justify-content: center; padding: 16px 22px; border-radius: 18px;
      border: 1px solid var(--border); background: white; color: var(--text); font-weight: 700;
      box-shadow: 0 4px 14px rgba(15,23,42,.04);
    }
    .btn:hover { border-color: var(--blue-200); color: var(--blue-700); }
    .hero {
      padding: 36px 0 54px;
      background:
        radial-gradient(circle at top left, rgba(96,165,250,.22), transparent 35%),
        radial-gradient(circle at bottom right, rgba(37,99,235,.18), transparent 28%),
        linear-gradient(180deg, #f8fbff, #ffffff);
    }
    .hero-grid { display: grid; grid-template-columns: 1fr 1.02fr; gap: 48px; align-items: center; }
    .badge {
      display: inline-flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: 999px;
      border: 1px solid var(--blue-100); background: rgba(255,255,255,.88); color: var(--blue-700); font-weight: 700;
    }
    h1 { font-size: clamp(2.5rem, 5vw, 4rem); line-height: 1.04; margin: 18px 0 0; }
    .lead { font-size: 1.18rem; color: var(--muted); max-width: 700px; margin-top: 18px; }
    .cta-row, .chip-row { display: flex; flex-wrap: wrap; gap: 14px; margin-top: 26px; }
    .chip {
      display: inline-flex; align-items: center; gap: 8px; background: white; border: 1px solid var(--border);
      padding: 10px 14px; border-radius: 999px; color: var(--muted); font-size: .95rem; box-shadow: 0 4px 14px rgba(15,23,42,.04);
    }
    .cards3 { margin-top: 28px; display: grid; gap: 14px; grid-template-columns: repeat(3, 1fr); }
    .info-card, .card, .white-card {
      background: white; border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow);
    }
    .info-card { padding: 18px; }
    .info-card h3 { margin: 0; font-size: 1rem; }
    .info-card p { margin: 8px 0 0; color: var(--muted); font-size: .94rem; }
    .hero-side { display: grid; grid-template-columns: .96fr .88fr; gap: 18px; }
    .card { padding: 16px; }
    .card-head { display: flex; align-items: center; justify-content: space-between; background: white; border-radius: 18px; padding: 12px 14px; box-shadow: 0 3px 12px rgba(15,23,42,.05); }
    .kicker { font-size: .72rem; letter-spacing: .18em; text-transform: uppercase; color: var(--blue-700); font-weight: 800; }
    .subtle { color: #64748b; font-size: .94rem; }
    .inner { background: white; border-radius: 22px; padding: 16px; margin-top: 14px; box-shadow: inset 0 0 0 1px rgba(226,232,240,.8); }
    .dest-btn {
      display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 14px; border: 1px solid #eef2f7;
      background: #f8fafc; border-radius: 18px; margin-top: 10px;
    }
    .dest-left { display: flex; gap: 12px; align-items: center; }
    .dest-iconbox { width: 56px; height: 56px; background: white; border-radius: 18px; padding: 4px; box-shadow: 0 3px 10px rgba(15,23,42,.05); }
    .nav-round { width: 44px; height: 44px; border-radius: 999px; background: white; display: grid; place-items: center; box-shadow: 0 3px 10px rgba(15,23,42,.05); color: var(--blue-700); font-weight: 700; }
    .notif { background: rgba(255,255,255,.95); border: 1px solid rgba(255,255,255,.9); border-radius: 18px; padding: 14px; box-shadow: var(--shadow); margin-top: 10px; }
    .notif-row { display: flex; gap: 12px; }
    .soft-block { padding: 18px; }
    .soft-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }
    .soft-tags span { background: var(--blue-50); color: var(--blue-700); padding: 8px 10px; border-radius: 999px; font-weight: 600; font-size: .84rem; }
    section { padding: 80px 0; }
    .blue-section { background: linear-gradient(180deg, var(--blue-50), rgba(219,234,254,.45), white); }
    .trust { background: var(--blue-50); border-top: 1px solid var(--blue-100); border-bottom: 1px solid var(--blue-100); padding: 18px 0; }
    .trust-row { display: flex; flex-wrap: wrap; justify-content: center; gap: 16px; color: #1e3a8a; font-weight: 700; }
    .title-block { text-align: center; max-width: 780px; margin: 0 auto 42px; }
    .eyebrow { text-transform: uppercase; letter-spacing: .18em; font-weight: 800; font-size: .8rem; color: var(--blue-700); }
    h2 { margin: 12px 0 0; font-size: clamp(2rem, 4vw, 3rem); line-height: 1.08; }
    .title-block p { color: var(--muted); font-size: 1.1rem; margin-top: 14px; }
    .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
    .white-card { padding: 26px; }
    .white-card .icon-wrap { width: 64px; height: 64px; border-radius: 18px; background: white; display: grid; place-items: center; box-shadow: 0 3px 10px rgba(15,23,42,.05); }
    .white-card h3 { margin: 18px 0 0; font-size: 1.25rem; }
    .white-card p { margin-top: 10px; color: var(--muted); }
    .dual-grid, .step-grid, .image-text, .resource-grid { display: grid; gap: 24px; }
    .dual-grid { grid-template-columns: repeat(2, 1fr); }
    .step-grid { grid-template-columns: repeat(3, 1fr); margin-top: 28px; }
    .step-card { padding: 24px; }
    .step-card p { color: var(--muted); }
    .image-text { grid-template-columns: 1fr .95fr; align-items: center; }
    .image-collage { display: grid; gap: 18px; }
    .row-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 18px; }
    .image-shell { overflow: hidden; border-radius: 32px; border: 1px solid var(--blue-100); background: white; box-shadow: var(--shadow); }
    .image-shell img { width: 100%; height: 100%; object-fit: cover; }
    .icon-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-top: 24px; }
    .icon-card { background: white; border-radius: 18px; box-shadow: 0 4px 14px rgba(15,23,42,.05); padding: 16px; text-align: center; }
    .icon-card .img-wrap { width: 80px; height: 80px; margin: 0 auto; }
    .resource-grid { grid-template-columns: repeat(2, 1fr); margin-top: 28px; }
    .resource-item { padding: 18px; background: white; border: 1px solid var(--blue-100); border-radius: 18px; box-shadow: 0 4px 14px rgba(15,23,42,.05); }
    .resource-item:hover { transform: translateY(-2px); background: var(--blue-50); border-color: var(--blue-200); }
    .cta-final { background: #516989; color: white; text-align: center; }
    .cta-final p { color: #eff6ff; max-width: 760px; margin: 18px auto 0; font-size: 1.1rem; }
    .footer { padding: 32px 0; border-top: 1px solid var(--border); background: white; }
    .footer-row { display: flex; justify-content: space-between; gap: 20px; align-items: center; flex-wrap: wrap; }
    .footer-links { display: flex; flex-wrap: wrap; gap: 18px; color: #64748b; }
    .hidden { display: none; }
    @media (max-width: 1024px) {
      .hero-grid, .hero-side, .grid-4, .dual-grid, .step-grid, .image-text, .resource-grid { grid-template-columns: 1fr; }
      .cards3 { grid-template-columns: 1fr; }
      .nav { display: none; }
    }
  </style>
</head>

    const resources = [

            bullets: [

            bullets: [
              'Track concerning incidents for a few weeks',
              'Choose a calm time to talk',
              'Offer rides, ride share help, family schedules, or preset navigation tools',

        ]
      },
      {

          {
            heading: 'Lead with empathy, not control',

        </section>

        <section class="trust"><div class="container trust-row"><span>Designed for caregivers</span><span>•</span><span>Built for simplicity</span><span>•</span><span>Focused on safety</span><span>•</span><span>Centered on independence</span></div></section>

        <section class="blue-section">
          <div class="container">
            <div class="title-block">
              <div class="eyebrow">Built for real-life caregiver situations</div>
              <h2>A calmer way to support senior driving</h2>
              <p>NaniNavi was created for aging parents, grandparents, and loved ones who still value independence but benefit from gentle guidance.</p>
            </div>
            <div class="grid-4">
              ${[
                [assets.destinationHome, 'Simple destination buttons', 'Caregivers define trusted places once so repeat trips feel clear, familiar, and easier to start.'],
                [assets.destinationDoctor, 'Less confusion, fewer steps', 'The app is built around large buttons and routine trips instead of full map app complexity.'],
                [assets.destinationChurch, 'Know when they arrive', 'Trip start and arrival updates reduce the silent uncertainty families feel while someone is on the road.'],
                [assets.destinationPark, 'Made for older adults and families', 'The experience supports confidence, calm, and a respectful balance between safety and independence.']
              ].map(([img, title, text]) => `
                <div class="white-card">
                  <div class="icon-wrap"><img src="${img}" alt="${title}"></div>
                  <h3>${title}</h3>
                  <p>${text}</p>
                </div>`).join('')}
            </div>
          </div>
        </section>

        <section class="blue-section">
          <div class="container">
            <div class="title-block">
              <div class="eyebrow">How it works</div>
              <h2>Two simple experiences, working together</h2>
              <p>NaniNavi is designed with two distinct paths, one for caregivers and one for drivers. Each has a different UI built for their role.</p>
            </div>
            <div class="dual-grid">
              <div class="white-card">
                <div class="eyebrow">Caregiver View</div>
                <h3 style="margin-top:10px; font-size:1.3rem">Set up trusted places</h3>
                <p>Caregivers create a simple list of familiar destinations once.</p>
                ${cardDestination('Home', '123 Main St', assets.destinationHome)}
                ${cardDestination('Doctor', 'Routine visit', assets.destinationDoctor)}
                ${cardDestination('Church', 'Weekly trip', assets.destinationChurch)}
              </div>
              <div class="white-card">
                <div class="eyebrow">Driver View</div>
                <h3 style="margin-top:10px; font-size:1.3rem">Tap and go</h3>
                <p>Drivers see large, simple buttons with no searching and no confusion.</p>
                <div class="image-shell" style="margin-top:16px;"><img src="${assets.homeButton}" alt="Driver destination button UI"></div>
              </div>
            </div>
            <div class="step-grid">
              <div class="white-card step-card"><div class="eyebrow">Step 1</div><h3>Caregiver sets destinations</h3><p>Create a list of familiar places ahead of time.</p></div>
              <div class="white-card step-card"><div class="eyebrow">Step 2</div><h3>Driver taps to go</h3><p>Large buttons make starting a trip simple and predictable.</p></div>
              <div class="white-card step-card"><div class="eyebrow">Step 3</div><h3>Caregiver gets updates</h3><p>Know when a trip starts and when they arrive.</p></div>
            </div>
          </div>
        </section>

        <section class="blue-section">
          <div class="container image-text">
            <div>
              <div class="eyebrow">Why families choose NaniNavi</div>
              <h2>Peace of mind without taking away independence.</h2>
              <p class="lead" style="font-size:1.08rem; max-width:none">Being a caregiver means worrying, especially when the people you love are behind the wheel. NaniNavi helps families support older drivers in a way that feels human, not restrictive.</p>
              <div style="margin-top:24px; display:grid; gap:14px;">
                <div class="chip">✓ Reduce anxiety around getting lost or taking wrong turns</div>
                <div class="chip">✓ Support independence without constant supervision</div>
                <div class="chip">✓ Create more confidence for senior drivers and less worry for caregivers</div>
              </div>
            </div>
            <div class="image-collage">
              <div class="image-shell"><img src="${assets.lifestyleCaregiverDad}" alt="Caregiver and older loved one looking at a phone together"></div>
              <div class="row-2">
                <div class="image-shell"><img src="${assets.lifestyleCaregiverPhone}" alt="Caregiver checking a phone at home"></div>
                <div class="image-shell"><img src="${assets.lifestyleSenior}" alt="Older man smiling while using a phone"></div>
              </div>
            </div>
          </div>
        </section>

        <section class="blue-section">
          <div class="container image-text" style="grid-template-columns:.95fr 1fr;">
            <div class="image-shell"><img src="${assets.lifestyleSonDad}" alt="Adult son standing with older father outdoors"></div>
            <div>
              <div class="eyebrow">For the people who matter most</div>
              <h2>Familiar places made easier for seniors and their families.</h2>
              <p class="lead" style="font-size:1.08rem; max-width:none">NaniNavi is designed for real families navigating one of the most emotional transitions: wanting older loved ones to stay independent while also wanting them to stay safe.</p>
              <div class="icon-grid">
                ${[
                  ['Home', assets.destinationHome], ['Church', assets.destinationChurch], ['Doctor', assets.destinationDoctor], ['Gas', assets.destinationGas], ['Park', assets.destinationPark], ['Restaurant', assets.destinationRestaurant]
                ].map(([label, img]) => `
                  <div class="icon-card"><div class="img-wrap"><img src="${img}" alt="${label}"></div><div style="margin-top:8px; font-weight:700; color:#334155;">${label}</div></div>`).join('')}
              </div>
            </div>
          </div>
        </section>

        <section class="blue-section">
          <div class="container">
            <div class="eyebrow">Resource center</div>
            <h2>Practical help for caregivers searching for answers.</h2>
            <p class="lead" style="font-size:1.08rem; max-width:760px">If you are worried about a parent or loved one driving, these guides walk you through what to look for, how to start the conversation, and what to do next.</p>
            <div class="resource-grid">${articleList()}</div>
          </div>
        </section>

        <section class="cta-final">
          <div class="container">
            <div class="eyebrow" style="color:#eff6ff">NaniNavi</div>
            <h2>Help your loved one stay independent while staying safe.</h2>
            <p>Set up familiar destinations, simplify every trip, and know when they arrive. NaniNavi gives caregivers peace of mind without taking control away.</p>
            <div class="cta-row" style="justify-content:center; margin-top:32px;">
              <a class="app-badge" href="${appStoreUrl}"><span style="font-size:1.3rem"></span><span><small>Download on the</small>App Store</span></a>
              <a class="btn" href="#/resources" style="background:rgba(255,255,255,.08); color:white; border-color:rgba(255,255,255,.28);">Explore caregiver resources</a>
            </div>
          </div>
        </section>
      `;
    }

    function renderHow() {
      return `
        <section class="hero"><div class="container title-block"><div class="eyebrow">How It Works</div><h1 style="font-size:clamp(2.4rem,5vw,3.6rem)">Two roles. Two experiences. One simple system.</h1><p class="lead" style="margin-left:auto;margin-right:auto;">NaniNavi separates the caregiver setup experience from the driver experience so each person only sees what they need.</p></div></section>
        <section style="padding-top:0"><div class="container"><div class="dual-grid"><div class="white-card"><div class="eyebrow">Caregiver View</div><h3 style="margin-top:10px">Set up trusted places</h3><p>Caregivers create a simple list of familiar destinations once.</p>${cardDestination('Home','123 Main St',assets.destinationHome)}${cardDestination('Doctor','Routine visit',assets.destinationDoctor)}${cardDestination('Church','Weekly trip',assets.destinationChurch)}</div><div class="white-card"><div class="eyebrow">Driver View</div><h3 style="margin-top:10px">Tap and go</h3><p>Drivers see large, simple buttons with no searching and no confusion.</p><div class="image-shell" style="margin-top:16px;"><img src="${assets.homeButton}" alt="Driver destination button UI"></div></div></div></div></section>
      `;
    }

    function renderCaregivers() {
      return `
        <section class="hero"><div class="container title-block"><div class="eyebrow">For Caregivers</div><h1 style="font-size:clamp(2.4rem,5vw,3.6rem)">Support independence without feeling completely in the dark</h1><p class="lead" style="margin-left:auto;margin-right:auto;">Families often want a middle ground between doing nothing and taking the keys away. NaniNavi is designed for that in-between stage where simplicity and reassurance matter most.</p></div></section>
        <section style="padding-top:0"><div class="container dual-grid"><div style="display:grid; gap:18px;">${[
          ['Reduce uncertainty', 'Know when a trip begins and when your loved one arrives.'],
          ['Support routine and familiarity', 'Preset common destinations so repeat trips feel easier and more consistent.'],
          ['Create a simpler driving plan', 'Build a safer routine around the places your loved one actually goes.'],
          ['Use it as part of a larger transition', 'NaniNavi can support the period when families are evaluating whether an older adult should keep driving.']
        ].map(([t,d]) => `<div class="white-card"><h3 style="margin:0">${t}</h3><p>${d}</p></div>`).join('')}</div><div class="white-card"><h3 style="margin:0">Who this is for</h3><div style="display:grid; gap:14px; margin-top:18px;">${[
          'Adult children helping aging parents with routine driving',
          'Families concerned about confusion or safety during familiar trips',
          'Caregivers who want visibility without constant check in calls',
          'Family drivers helping transport an older adult to regular destinations'
        ].map(item => `<div class="chip">✓ ${item}</div>`).join('')}</div></div></div></section>`;
    }

    function renderResources() {
      return `
        <section class="hero"><div class="container title-block"><div class="eyebrow">Resources</div><h1 style="font-size:clamp(2.4rem,5vw,3.6rem)">Senior driving, caregiver guidance, and family support resources</h1><p class="lead" style="margin-left:auto;margin-right:auto;">This section is designed to answer the questions families actually search for when they are worried about an aging parent and driving.</p></div></section>
        <section style="padding-top:0"><div class="container resource-grid">${resources.map(item => `
          <a class="resource-item" href="#/${item.slug}"><div class="eyebrow">${item.category}</div><div style="font-size:1.4rem; font-weight:800; color:#0f172a; margin-top:8px;">${item.title}</div><p style="color:#475569">${item.description}</p></a>`).join('')}</div></section>`;
    }

    function renderSupport() {
      return `
        <section class="hero"><div class="container title-block"><div class="eyebrow">Support</div><h1 style="font-size:clamp(2.4rem,5vw,3.6rem)">Need help with NaniNavi?</h1><p class="lead" style="margin-left:auto;margin-right:auto;">For product questions, support requests, or launch inquiries, reach out using the details below.</p></div></section>
        <section style="padding-top:0"><div class="container grid-4" style="grid-template-columns:repeat(3,1fr)"><div class="white-card"><h3>Contact</h3><p>${supportEmail}</p></div><div class="white-card"><h3>Response time</h3><p>Typically within 1 to 2 business days</p></div><div class="white-card"><h3>Help topics</h3><p>App setup, caregiver use, trip notifications, and launch questions</p></div></div></section>`;
    }

    function renderPrivacy() {
      return `
        <section class="hero"><div class="container title-block"><div class="eyebrow">Privacy</div><h1 style="font-size:clamp(2.4rem,5vw,3.6rem)">Privacy-first by design</h1><p class="lead" style="margin-left:auto;margin-right:auto;">Replace this section with your final privacy policy. This starter page gives you a clean placeholder for launch and future updates.</p></div></section>
        <section style="padding-top:0"><div class="container"><div class="white-card"><p>NaniNavi is committed to protecting user information and designing experiences that are simple, respectful, and appropriate for families supporting older adults.</p><p>This placeholder should be replaced with your full legal privacy policy covering data collection, notifications, account handling, analytics, and support contact information.</p><p>Recommended launch sections include what information is collected, how it is used, how notifications work, data retention, third party services, and how users can contact you with questions.</p></div></div></section>`;
    }

    function renderArticle(article) {
      return `
        <section class="hero"><div class="container"><div style="max-width:900px; margin:0 auto;"><a href="#/resources" class="eyebrow">Back to resources</a><div class="eyebrow" style="margin-top:20px">${article.category}</div><h1 style="font-size:clamp(2.4rem,5vw,3.6rem)">${article.title}</h1><p class="lead">${article.summary}</p></div></div></section>
        <section style="padding-top:0"><div class="container" style="max-width:900px;">
          ${article.sections.map(section => `
            <div class="white-card" style="margin-bottom:24px;">
              <h3 style="margin-top:0; font-size:1.7rem;">${section.heading}</h3>
              ${section.body.map(p => `<p style="color:#334155">${p}</p>`).join('')}
              <ul style="padding-left:20px; color:#334155;">
                ${section.bullets.map(b => `<li style="margin:8px 0">${b}</li>`).join('')}
              </ul>
            </div>`).join('')}
          <div class="white-card" style="background:#0f172a; color:white;">
            <div class="eyebrow" style="color:#93c5fd">Where NaniNavi fits</div>
            <h3>A practical tool for families managing familiar senior trips</h3>
            <p style="color:#cbd5e1">NaniNavi is built for families who want a simpler routine around common destinations and caregiver awareness when a trip starts and ends.</p>
            <div class="cta-row"><a class="btn" href="${appStoreUrl}" style="background:#3b82f6; color:white; border-color:#3b82f6">View on App Store</a><a class="btn" href="#/for-caregivers" style="background:rgba(255,255,255,.05); color:white; border-color:rgba(255,255,255,.15)">Learn how it helps caregivers</a></div>
          </div>
        </div></section>`;
    }

    function renderNotFound() {
      return `<section class="hero"><div class="container title-block"><div class="eyebrow">Not found</div><h1 style="font-size:clamp(2.4rem,5vw,3.6rem)">Page not found</h1><p class="lead" style="margin-left:auto;margin-right:auto;">The page you’re looking for does not exist yet. Use the navigation to return to the main site.</p><div class="cta-row" style="justify-content:center;"><a class="btn" href="#/">Go home</a></div></div></section>`;
    }

    function footer() {
      return `
        <footer class="footer">
          <div class="container footer-row">
            <div class="brand">
              <svg class="brand-mark" viewBox="0 0 64 64" aria-hidden="true">
                <use href="#"></use>
                <defs>
                  <linearGradient id="pinGradFooter" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#93C5FD" /><stop offset="100%" stop-color="#2563EB" /></linearGradient>
                  <linearGradient id="heartGradFooter" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FFFFFF" /><stop offset="100%" stop-color="#E2E8F0" /></linearGradient>
                </defs>
                <path d="M32 60c10-12.1 21-24.9 21-37.5C53 10.7 43.2 3 32 3S11 10.7 11 22.5C11 35.1 22 47.9 32 60Z" fill="url(#pinGradFooter)"/>
                <circle cx="32" cy="24" r="15.5" fill="#2563EB" opacity="0.95"/>
                <path d="M32 32.7c-4.2-2.7-9.8-6.7-9.8-11.8 0-3.3 2.5-5.9 5.7-5.9 1.8 0 3.2.8 4.1 2.2.9-1.4 2.3-2.2 4.1-2.2 3.2 0 5.7 2.6 5.7 5.9 0 5.1-5.6 9.1-9.8 11.8Z" fill="url(#heartGradFooter)"/>
              </svg>
              <div><div class="brand-title" style="font-size:1.2rem">NaniNavi</div><div style="color:#64748b; font-size:.92rem;">Preset maps for seniors. Peace of mind for caregivers.</div></div>
            </div>
            <div class="footer-links"><a href="#/">Home</a><a href="#/how-it-works">How It Works</a><a href="#/for-caregivers">For Caregivers</a><a href="#/resources">Resources</a><a href="#/support">Support</a><a href="#/privacy">Privacy</a></div>
          </div>
        </footer>`;
    }

    function render() {
      const path = (location.hash || '#/').replace(/^#/, '') || '/';
      document.title = 'NaniNavi | Senior driving support for caregivers';
      if (routes[path]) {
        app.innerHTML = routes[path]() + footer();
      } else {
        const article = resources.find(r => `/${r.slug}` === path);
        app.innerHTML = article ? renderArticle(article) + footer() : renderNotFound() + footer();
      }
      window.scrollTo({ top: 0, behavior: 'auto' });
    }

    window.addEventListener('hashchange', render);
    render();
  </script>
</body>
</html>
